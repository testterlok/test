<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Тест Орталығы</title>
    <style>
        /* НЕГІЗГІ СТИЛЬДЕР - Градиентті фон */
        body {
            font-family: 'Poppins', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #2d3436;
        }

        /* КОНТЕЙНЕР - Glassmorphism эффектісі */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 680px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* ТАҚЫРЫП style */
        h1 {
            text-align: center;
            color: #4a148c;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 2.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .menu, .quiz-area, .result-area { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        p.category-text {
            text-align: center;
            color: #6c5ce7;
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* НЕГІЗГІ БАТЫРМАЛАР (Мәзір) */
        .menu-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(108, 92, 231, 0.1);
            color: #6c5ce7;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .menu-btn:hover {
            background: #6c5ce7;
            color: white;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        .menu-btn::after {
            content: '→';
            position: absolute;
            right: 20px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .menu-btn:hover::after {
            opacity: 1;
            right: 15px;
        }

        .random-btn {
            background: #8e44ad !important;
            color: white !important;
            text-align: center !important;
        }
        .random-btn:hover {
            background: #9b59b6 !important;
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.4) !important;
        }

        /* СҰРАҚ ЖӘНЕ ПРОГРЕСС */
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-weight: 700;
            color: #7f8c8d;
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 10px;
            border-left: 5px solid #6c5ce7;
        }

        #question-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #2c3e50;
            line-height: 1.4;
        }

        /* ЖАУАП НҰСҚАЛАРЫ */
        .option-btn {
            background: white;
            color: #2d3436;
            text-align: left;
            border: 2px solid #e0e0e0;
            padding: 16px 20px;
            margin: 10px 0;
            width: 100%;
            display: block;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            border-color: #a29bfe;
            background: #fcfcff;
            transform: translateY(-2px);
        }

        /* ДҰРЫС/ҚАТЕ ЖАУАПТАР */
        .correct {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
            animation: pulseCorrect 0.4s;
        }

        .wrong {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
            animation: shakeWrong 0.4s;
        }

        @keyframes pulseCorrect {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shakeWrong {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* КЕРІ БАЙЛАНЫС ЖӘНЕ КЕЛЕСІ БАТЫРМА */
        .feedback {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            display: none;
            line-height: 1.6;
            font-size: 15px;
            border-width: 1px;
            border-style: solid;
        }

        #next-btn {
            background: #27ae60;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            margin-top: 25px;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }

        #next-btn:hover {
            background: #2ecc71;
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.4);
            transform: translateY(-2px);
        }

        /* НӘТИЖЕ АЙМАҒЫ */
        .result-card {
            text-align: center;
            background: #f8f9fa;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            margin-bottom: 25px;
        }

        #score-text {
            font-size: 3rem;
            font-weight: 800;
            color: #6c5ce7;
            margin: 10px 0;
        }

        .back-btn {
            background: #34495e;
            color: white;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .back-btn:hover { background: #2c3e50; }

        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h1>CMS Тест Орталығы</h1>

    <div id="menu" class="menu active">
        <p class="category-text">Тест санатын таңдаңыз</p>
        <button class="menu-btn" onclick="startQuiz(0, 30)">Joomla Негіздері (1-30)</button>
        <button class="menu-btn" onclick="startQuiz(30, 50)">Drupal Негіздері (31-50)</button>
        <button class="menu-btn" onclick="startQuiz(50, 99)">CMS Қауіпсіздігі (51-99)</button>
        <button class="menu-btn" onclick="startQuiz(99, 140)">WordPress Негіздері (100-140)</button>
        <hr>
        <button class="menu-btn random-btn" onclick="startRandomQuiz(20)">🎲 Рандом 20 сұрақ (Аралас)</button>
    </div>

    <div id="quiz-area" class="quiz-area">
        <div class="info">
            <span>Прогресс:</span>
            <span id="progress">Сұрақ 1 / 0</span>
        </div>
        <div id="question-text"></div>
        <div id="options-container"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()" style="display:none;">Келесі сұрақ</button>
    </div>

    <div id="result-area" class="result-area">
        <div class="result-card">
            <h2>Тест аяқталды!</h2>
            <p>Сіздің көрсеткішіңіз:</p>
            <p id="score-text"></p>
        </div>
        <button class="back-btn" onclick="goBackToMenu()">🏠 Бас мәзірге қайту</button>
    </div>
</div>

<script>
    // Сұрақтар базасы (Код өзгеріссіз қалды, тек стилизация қосылды)

        {q:"Joomla-дағы кеңейтімдердің қай түрі сайтқа жаңа функционалдылықты қосуға мүмкіндік береді?",a:["Компоненттер","Шаблондар","Модульдер","Плагиндер","Кітапханалар"],correct:0},
        {q:"Joomla жүйесінде кеңейтімдерді орнату үшін қандай әдіс қолданылады?",a:["FTP","URL","Пакеттік файл","SSH","API"],correct:2},
        {q:"Joomla үлгісіндегі қай файл CSS мәнерлеріне жауап береді?",a:["style.css","template.css","theme.css","main.css","design.css"],correct:1},
        {q:"Мультимедианы басқару үшін қандай Joomla құралы пайдаланылады?",a:["Article Manager","Media Manager","Module Manager","Plugin Manager","Template Manager"],correct:1},
        {q:"Joomla жүйесіне енгізілген нұсқаны басқару жүйесі қалай аталады?",a:["Git","Subversion","Version Control System","Joomla Version Control","Track Changes"],correct:1},

        {q:"Төменде келтірілген мәзір түрлерінің қайсысы Joomla-да жоқ?",a:["Single Article","Category Blog","Category List","Front Page","External URL"],correct:3},
        {q:"Joomla мақалалары қайда сақталады?",a:["модульдерде","плагиндерде","компоненттерде","мәліметтер базасында","конфигурация файлдарында"],correct:3},

    // --- Логика (Стильдерге байланысты аздап жаңартылды) ---

    let currentQuiz = [];
    let currentIdx = 0;
    let score = 0;

    function startQuiz(start, end) {
        currentQuiz = allQuestions.slice(start, end);
        initQuiz();
    }

    function startRandomQuiz(count) {
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        currentQuiz = shuffled.slice(0, count);
        initQuiz();
    }

    function initQuiz() {
        currentIdx = 0;
        score = 0;
        switchView('quiz-area');
        showQuestion();
    }

    function showQuestion() {
        const qData = currentQuiz[currentIdx];
        
        // Кері байланысты тазалау
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'none';
        feedback.className = 'feedback'; 
        document.getElementById('next-btn').style.display = 'none';
        
        // Прогресс пен мәтін
        document.getElementById('progress').innerText = `Сұрақ ${currentIdx + 1} / ${currentQuiz.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        // Жауаптар
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const labels = ['A', 'B', 'C', 'D', 'E'];
        qData.a.forEach((opt, index) => {
            if(!opt) return; // Егер нұсқа бос болса өткізіп жіберу
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<b>${labels[index]}</b> ${opt}`;
            btn.onclick = () => checkAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(userIndex, btn) {
        const qData = currentQuiz[currentIdx];
        const allButtons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        const labels = ['A', 'B', 'C', 'D', 'E'];
        
        // Барлық батырмаларды бұғаттау
        allButtons.forEach(b => b.disabled = true);

        if (userIndex === qData.correct) {
            btn.classList.add('correct');
            feedback.innerHTML = `✅ <b>Өте жақсы!</b> Бұл дұрыс жауап.`;
            feedback.style.borderColor = '#2ecc71';
            feedback.style.color = '#27ae60';
            feedback.style.background = '#eafaf1';
            score++;
        } else {
            btn.classList.add('wrong');
            // Дұрыс жауапты көрсету
            allButtons[qData.correct].classList.add('correct');
            feedback.innerHTML = `❌ <b>Қате!</b> Сіз ${labels[userIndex]} нұсқасын таңдадыңыз.<br>Дұрыс жауап: <b>${labels[qData.correct]}) ${qData.a[qData.correct]}</b>`;
            feedback.style.borderColor = '#e74c3c';
            feedback.style.color = '#c0392b';
            feedback.style.background = '#fdedec';
        }
        
        feedback.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuiz.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        switchView('result-area');
        const percent = Math.round((score / currentQuiz.length) * 100);
        let color = '#e74c3c'; // Нашар
        if(percent >= 50) color = '#f39c12'; // Орташа
        if(percent >= 80) color = '#2ecc71'; // Жақсы
        
        const scoreText = document.getElementById('score-text');
        scoreText.innerText = `${percent}%`;
        scoreText.style.color = color;
        
        document.getElementById('score-text').innerHTML += `<div style="font-size:1.2rem; color:#7f8c8d; font-weight:600; margin-top:10px;">(${score} / ${currentQuiz.length} дұрыс)</div>`;
    }

    function goBackToMenu() {
        switchView('menu');
    }

    // Көріністерді ауыстырудың көмекші функциясы
    function switchView(viewId) {
        // Барлық аймақтарды жабу
        document.getElementById('menu').classList.remove('active');
        document.getElementById('quiz-area').classList.remove('active');
        document.getElementById('result-area').classList.remove('active');
        
        // Қажеттісін ашу
        document.getElementById(viewId).classList.add('active');
    }
</script>
