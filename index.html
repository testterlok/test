        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .menu, .quiz-area, .result-area { display: none; }
        .active { display: block; }
        button { 
            display: block; width: 100%; padding: 12px; margin: 10px 0;

            transition: 0.3s; background: #3498db; color: white;

        .option-btn { background: #ecf0f1; color: #2c3e50; text-align: left; border: 1px solid #dcdde1; }

        .wrong { background: #e74c3c !important; color: white; }
        .correct { background: #2ecc71 !important; color: white; }
        .info { margin-bottom: 20px; font-weight: bold; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 6px; display: none; line-height: 1.5; border: 1px solid #fab1a0; }
    </style>
</head>
<body>

<div class="container">
    <h1>CMS Тест Орталығы</h1>

    <div id="menu" class="menu active">
        <p style="text-align:center; color: #636e72;">Тест санатын таңдаңыз:</p>
        <button onclick="startQuiz(0, 30)">1 - 30: Joomla Негіздері</button>

        <button onclick="startQuiz(99, 140)">100 - 140: WordPress Негіздері</button>
        <hr style="margin: 20px 0; opacity: 0.3;">
        <button onclick="startRandomQuiz(20)" style="background: #8e44ad;">Рандом 20 сұрақ (Аралас)</button>
    </div>

    <div id="quiz-area" class="quiz-area">

        <div id="question-text" style="font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #2c3e50;"></div>
        <div id="options-container"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()" style="display:none; background: #27ae60; margin-top: 20px;">Келесі сұрақ</button>
    </div>

    <div id="result-area" class="result-area">
        <h2 style="text-align: center;">Тест аяқталды!</h2>

    let currentQuiz = [];
    let currentIdx = 0;
    let score = 0;

    function startQuiz(start, end) {
        currentQuiz = allQuestions.slice(start, end);
        initQuiz();
    }

    function startRandomQuiz(count) {
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        currentQuiz = shuffled.slice(0, count);
        initQuiz();
    }

    function initQuiz() {
        currentIdx = 0;
        score = 0;
        document.getElementById('menu').classList.remove('active');
        document.getElementById('result-area').classList.remove('active');
        document.getElementById('quiz-area').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const qData = currentQuiz[currentIdx];
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        
        feedback.style.display = 'none';
        nextBtn.style.display = 'none';
        
        document.getElementById('progress').innerText = `Сұрақ: ${currentIdx + 1} / ${currentQuiz.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const labels = ['A', 'B', 'C', 'D', 'E'];
        qData.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${labels[index]}) ${opt}`;
            btn.onclick = () => checkAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(userIndex, btn) {
        const qData = currentQuiz[currentIdx];
        const allButtons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        const labels = ['A', 'B', 'C', 'D', 'E'];
        
        allButtons.forEach(b => b.disabled = true);

        if (userIndex === qData.correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allButtons[qData.correct].classList.add('correct');
            feedback.style.display = 'block';
            feedback.style.background = '#fff5f5';
            feedback.innerHTML = `<strong>Қате!</strong> Дұрыс жауап: <b>${labels[qData.correct]}) ${qData.a[qData.correct]}</b>`;
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuiz.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').classList.remove('active');
        document.getElementById('result-area').classList.add('active');
        const percent = Math.round((score / currentQuiz.length) * 100);
        document.getElementById('score-text').innerText = `${score} / ${currentQuiz.length} (${percent}%)`;
    }

    function goBackToMenu() {
        document.getElementById('result-area').classList.remove('active');
        document.getElementById('menu').classList.add('active');
    }
</script>
